<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Growth Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js" defer></script>
</head>
<body>

    <main class="container">
        <a href="../index.html" class="back-link">← Back to Portfolio</a>
        
        <h2 class="section-title">Compound Growth Calculator</h2>
        
        <div class="app-container">
            <div class="app-controls">
                <div class="input-group">
                    <label for="fundSelect">Select an Index Fund / Stock:</label>
                    <select id="fundSelect">
                        <option value="">Loading funds...</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="monthlyContribution">Monthly Contribution ($):</label>
                    <input type="number" id="monthlyContribution" value="500" min="0" step="50">
                </div>

                <div class="app-results">
                    <h3>Projected Milestones</h3>
                    <div id="results-container">
                        </div>
                </div>
            </div>
            
            <div class="app-graph">
                <canvas id="growthChart"></canvas>
            </div>
        </div>
    </main>

</body>
</html>
